<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYNTHEX — Step Sequencer</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="scanline-overlay"></div>
  <div class="noise-overlay"></div>

  <div class="app-wrapper">

    <header class="app-header">
      <div class="header-left">
        <span class="logo-badge">SX-16</span>
        <div class="header-title-group">
          <h1 class="app-title">SYNTHEX</h1>
          <p class="app-subtitle">POLYPHONIC STEP SEQUENCER</p>
        </div>
      </div>
      <div class="header-status">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-label" id="statusLabel">STOPPED</span>
      </div>
    </header>

    <section class="visualizer-section">
      <div class="visualizer-label">OSC · WAVEFORM MONITOR</div>
      <canvas id="visualizerCanvas" class="visualizer-canvas"></canvas>
      <div class="visualizer-corner tl"></div>
      <div class="visualizer-corner tr"></div>
      <div class="visualizer-corner bl"></div>
      <div class="visualizer-corner br"></div>
    </section>

    <section class="controls-section">
      <div class="control-group">
        <label class="ctrl-label" for="volumeSlider">
          <span class="ctrl-icon">▶</span> VOLUME
        </label>
        <div class="slider-track-wrap">
          <input type="range" id="volumeSlider" class="ctrl-slider" min="0" max="100" value="70" />
        </div>
        <span class="ctrl-value" id="volumeVal">70</span>
      </div>

      <div class="control-group">
        <label class="ctrl-label" for="tempoSlider">
          <span class="ctrl-icon">◈</span> TEMPO
        </label>
        <div class="slider-track-wrap">
          <input type="range" id="tempoSlider" class="ctrl-slider" min="40" max="220" value="120" />
        </div>
        <span class="ctrl-value" id="tempoVal">120 <small>BPM</small></span>
      </div>

      <div class="control-group control-group--select">
        <label class="ctrl-label" for="waveformSelect">
          <span class="ctrl-icon">∿</span> WAVEFORM
        </label>
        <div class="select-wrap">
          <select id="waveformSelect" class="ctrl-select">
            <option value="sine">── SINE</option>
            <option value="square" selected>▭ SQUARE</option>
            <option value="sawtooth">⊿ SAWTOOTH</option>
          </select>
          <span class="select-arrow">▾</span>
        </div>
      </div>
    </section>

    <section class="sequencer-section">
      <div class="grid-header">
        <div class="grid-header-label">STEP MATRIX · 4 VOICES × 16 STEPS</div>
        <div class="beat-numbers" id="beatNumbers"></div>
      </div>
      <div class="grid-body" id="gridBody"></div>
    </section>

    <section class="transport-section">
      <div class="transport-inner">
        <button class="transport-btn" id="playStopBtn">
          <span class="btn-icon" id="btnIcon">▶</span>
          <span class="btn-text" id="btnText">PLAY</span>
        </button>
        <div class="step-counter">
          STEP <span id="stepCounter">--</span> / 16
        </div>
      </div>
    </section>

    <footer class="app-footer">
      <span>SYNTHEX SX-16 · WEB AUDIO ENGINE · © 2025</span>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
